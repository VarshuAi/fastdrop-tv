name: Build FastDrop Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  # Allows you to manually trigger the build from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # Since we didn't check in the heavy binary gradle wrapper, we install gradle
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      
    - name: Build debug APK
      run: |
        cd android-server
        gradle assembleDebug

    - name: Upload Compiled APK
      uses: actions/upload-artifact@v3
      with:
        name: FastDrop-Server-APK
        path: android-server/app/build/outputs/apk/debug/app-debug.apk
